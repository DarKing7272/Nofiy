<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الإشعارات - تيليجرام</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0088cc;
            --primary-dark: #006699;
            --primary-light: #e6f4fa;
            --success: #2ecc71;
            --danger: #e74c3c;
            --dark: #1a1a2e;
            --gray: #6c757d;
            --light-gray: #f8f9fa;
            --white: #ffffff;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            --shadow-hover: 0 20px 60px rgba(0, 0, 0, 0.15);
            --border-radius: 18px;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: gradientShift 10s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .container {
            width: 100%;
            max-width: 650px;
            margin: 0 auto;
        }

        /* بطاقة الإشعار الرئيسية */
        .notification-card {
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 40px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .notification-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 5px;
            background: linear-gradient(90deg, #0088cc, #667eea, #764ba2);
            background-size: 200% 200%;
            animation: gradientShift 3s ease infinite;
        }

        .notification-card:hover {
            box-shadow: var(--shadow-hover);
            transform: translateY(-2px);
        }

        /* رأس البطاقة */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .telegram-icon {
            font-size: 50px;
            color: var(--primary);
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
            display: inline-block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .header h1 {
            color: var(--dark);
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--gray);
            font-size: 16px;
        }

        /* الإحصائيات */
        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 35px;
        }

        .stat-box {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: default;
        }

        .stat-box:hover {
            border-color: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 136, 204, 0.15);
        }

        .stat-box i {
            font-size: 28px;
            color: var(--primary);
            background: var(--primary-light);
            padding: 12px;
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .stat-box:hover i {
            transform: scale(1.1);
            background: var(--primary);
            color: white;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: var(--dark);
        }

        .stat-label {
            font-size: 14px;
            color: var(--gray);
        }

        /* نموذج الإدخال */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            color: var(--dark);
            font-weight: 600;
            font-size: 15px;
        }

        .form-group label i {
            color: var(--primary);
            font-size: 18px;
            transition: all 0.3s ease;
        }

        .form-group:focus-within label i {
            transform: scale(1.2);
            color: var(--primary-dark);
        }

        .input-wrapper {
            position: relative;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            font-size: 15px;
            font-family: 'Cairo', sans-serif;
            transition: all 0.3s ease;
            background: var(--light-gray);
            color: var(--dark);
        }

        .input-wrapper input {
            padding-left: 50px;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 4px rgba(0, 136, 204, 0.1);
        }

        .form-group input::placeholder {
            color: #aaa;
            font-size: 14px;
        }

        .paste-btn {
            position: absolute;
            left: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--primary);
            color: var(--white);
            border: none;
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Cairo', sans-serif;
        }

        .paste-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-50%) scale(1.05);
        }

        .paste-btn:active {
            transform: translateY(-50%) scale(0.95);
        }

        /* زر الإرسال */
        .send-button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #0088cc 0%, #006699 100%);
            color: var(--white);
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .send-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: all 0.5s ease;
        }

        .send-button:hover::before {
            left: 100%;
        }

        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0, 136, 204, 0.3);
        }

        .send-button:active {
            transform: translateY(0);
        }

        .send-button:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: var(--white);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* رسالة التنبيه */
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--success);
            color: var(--white);
            padding: 16px 24px;
            border-radius: 12px;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(46, 204, 113, 0.3);
            z-index: 1000;
            animation: slideDown 0.5s ease;
            font-family: 'Cairo', sans-serif;
        }

        .toast.error {
            background: var(--danger);
            box-shadow: 0 10px 30px rgba(231, 76, 60, 0.3);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        /* قائمة الإشعارات الحديثة */
        .recent-notifications {
            margin-top: 30px;
            background: var(--white);
            border-radius: var(--border-radius);
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .recent-notifications h2 {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--dark);
            font-size: 20px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .recent-notifications h2 i {
            color: var(--primary);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--gray);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }

        .notification-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #ffffff 100%);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            border-right: 4px solid var(--primary);
            transition: all 0.3s ease;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .notification-item:hover {
            transform: translateX(-5px);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            border-right-width: 6px;
        }

        .notification-item h4 {
            color: var(--dark);
            margin-bottom: 8px;
            font-size: 16px;
        }

        .notification-item p {
            color: var(--gray);
            font-size: 14px;
            margin-bottom: 5px;
            word-break: break-all;
        }

        .notification-item a {
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .notification-item a:hover {
            color: var(--primary-dark);
            text-decoration: underline;
        }

        .notification-item .time {
            font-size: 12px;
            color: var(--gray);
            opacity: 0.7;
            margin-top: 5px;
        }

        .channel-badge {
            background: linear-gradient(135deg, #0088cc 0%, #667eea 100%);
            color: var(--white);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-top: 5px;
            font-weight: 600;
        }

        /* تنسيقات للأجهزة المحمولة */
        @media (max-width: 768px) {
            .notification-card {
                padding: 25px 20px;
            }
            
            .header h1 {
                font-size: 24px;
            }
            
            .stats-container {
                grid-template-columns: 1fr;
            }
            
            .stat-box {
                padding: 15px;
            }
            
            .toast {
                right: 20px;
                left: 20px;
                transform: none;
                width: calc(100% - 40px);
                text-align: center;
                justify-content: center;
            }
        }

        /* تأثيرات خاصة */
        .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 136, 204, 0.4);
            }
            70% {
                box-shadow: 0 0 0 10px rgba(0, 136, 204, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 136, 204, 0);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- البطاقة الرئيسية -->
        <div class="notification-card">
            <div class="header">
                <i class="fab fa-telegram-plane telegram-icon"></i>
                <h1>نظام إشعارات تيليجرام</h1>
                <p class="subtitle">أرسل إشعارات لمشتركي البوت مباشرة</p>
            </div>

            <!-- الإحصائيات -->
            <div class="stats-container">
                <div class="stat-box">
                    <i class="fas fa-users"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="subscribersCount">جاري التحميل...</span>
                        <span class="stat-label">مشترك</span>
                    </div>
                </div>
                <div class="stat-box">
                    <i class="fas fa-bell"></i>
                    <div class="stat-info">
                        <span class="stat-number" id="notificationsSent">0</span>
                        <span class="stat-label">إشعار مرسل</span>
                    </div>
                </div>
            </div>

            <!-- نموذج الإشعار -->
            <form id="notificationForm">
                <div class="form-group">
                    <label for="fileLink">
                        <i class="fas fa-link"></i>
                        رابط الملف أو المنشور
                    </label>
                    <div class="input-wrapper">
                        <input 
                            type="url" 
                            id="fileLink" 
                            placeholder="https://t.me/your_channel/123" 
                            required
                        >
                        <button type="button" id="pasteBtn" class="paste-btn">
                            <i class="fas fa-paste"></i> لصق
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="fileName">
                        <i class="fas fa-file-alt"></i>
                        اسم الملف
                    </label>
                    <input 
                        type="text" 
                        id="fileName" 
                        placeholder="أدخل اسم الملف أو المنشور" 
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="channelName">
                        <i class="fas fa-broadcast-tower"></i>
                        معرف القناة
                    </label>
                    <input 
                        type="text" 
                        id="channelName" 
                        placeholder="@your_channel" 
                        value="@your_channel"
                        required
                    >
                </div>

                <button type="submit" id="sendBtn" class="send-button pulse">
                    <i class="fas fa-paper-plane"></i>
                    <span>إرسال الإشعار</span>
                    <div class="loading-spinner"></div>
                </button>
            </form>
        </div>

        <!-- الإشعارات الحديثة -->
        <div class="recent-notifications">
            <h2>
                <i class="fas fa-history"></i>
                آخر الإشعارات
            </h2>
            <div id="recentList" class="recent-list">
                <div class="empty-state">
                    <i class="fas fa-inbox"></i>
                    <p>لا توجد إشعارات حديثة</p>
                </div>
            </div>
        </div>
    </div>

    <!-- رسالة التنبيه -->
    <div id="notificationToast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>

    <script>
        // ============== الإعدادات ==============
        // قم بتغيير هذه القيم حسب إعداداتك
        const WORKER_URL = 'https://your-worker.your-subdomain.workers.dev';
        const SECRET_TOKEN = 'YOUR_SECRET_TOKEN';
        
        // ============== المتغيرات العامة ==============
        let subscribersCount = 0;
        let notificationsSent = 0;

        // ============== الدوال المساعدة ==============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            const toastMessage = document.getElementById('toastMessage');
            const icon = toast.querySelector('i');
            
            // إعادة تعيين الكلاسات
            toast.className = 'toast';
            toast.classList.add(type);
            
            // تغيير الأيقونة
            icon.className = type === 'success' ? 'fas fa-check-circle' : 'fas fa-exclamation-circle';
            
            toastMessage.textContent = message;
            toast.style.display = 'flex';
            
            // إخفاء بعد 3 ثواني
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // ============== إدارة الإحصائيات ==============
        async function loadStats() {
            try {
                const response = await fetch(`${WORKER_URL}/stats`);
                if (!response.ok) throw new Error('Failed to fetch stats');
                
                const data = await response.json();
                subscribersCount = data.subscribers || 0;
                notificationsSent = data.notifications || 0;
                updateStats();
            } catch (error) {
                console.error('Error loading stats:', error);
                document.getElementById('subscribersCount').textContent = 'غير متاح';
            }
        }

        function updateStats() {
            document.getElementById('subscribersCount').textContent = subscribersCount;
            document.getElementById('notificationsSent').textContent = notificationsSent;
        }

        // ============== وظيفة اللصق ==============
        document.getElementById('pasteBtn').addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                const linkInput = document.getElementById('fileLink');
                linkInput.value = text;
                linkInput.focus();
                
                // إضافة تأثير visual
                linkInput.style.borderColor = '#2ecc71';
                setTimeout(() => {
                    linkInput.style.borderColor = '#e1e8ed';
                }, 1000);
                
                showToast('تم لصق الرابط بنجاح 📋');
            } catch (error) {
                showToast('فشل في الوصول إلى الحافظة - يرجى لصق الرابط يدوياً', 'error');
            }
        });

        // ============== إرسال الإشعار ==============
        document.getElementById('notificationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const sendBtn = document.getElementById('sendBtn');
            const btnText = sendBtn.querySelector('span');
            const btnIcon = sendBtn.querySelector('i');
            const spinner = sendBtn.querySelector('.loading-spinner');
            
            const fileLink = document.getElementById('fileLink').value.trim();
            const fileName = document.getElementById('fileName').value.trim();
            const channelName = document.getElementById('channelName').value.trim();
            
            // التحقق من صحة البيانات
            if (!fileLink || !fileName || !channelName) {
                showToast('يرجى ملء جميع الحقول المطلوبة ⚠️', 'error');
                return;
            }
            
            // تفعيل حالة التحميل
            sendBtn.disabled = true;
            sendBtn.classList.remove('pulse');
            btnIcon.style.display = 'none';
            btnText.textContent = 'جاري الإرسال...';
            spinner.style.display = 'block';
            
            try {
                const response = await fetch(`${WORKER_URL}/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${SECRET_TOKEN}`
                    },
                    body: JSON.stringify({
                        fileLink,
                        fileName,
                        channelName
                    })
                });
                
                const result = await response.json();
                
                if (response.ok) {
                    showToast(`تم إرسال الإشعار بنجاح إلى ${result.sentCount} مشترك 🎉`);
                    notificationsSent++;
                    updateStats();
                    addToRecentNotifications(fileName, fileLink, channelName);
                    
                    // تنظيف النموذج
                    document.getElementById('fileLink').value = '';
                    document.getElementById('fileName').value = '';
                    document.getElementById('channelName').value = '@your_channel';
                } else {
                    showToast(result.error || 'فشل في إرسال الإشعار ❌', 'error');
                }
            } catch (error) {
                showToast('حدث خطأ في الاتصال بالسيرفر ⚠️', 'error');
                console.error('Error:', error);
            } finally {
                // إعادة تعيين حالة الزر
                sendBtn.disabled = false;
                sendBtn.classList.add('pulse');
                btnIcon.style.display = 'inline-block';
                btnText.textContent = 'إرسال الإشعار';
                spinner.style.display = 'none';
            }
        });

        // ============== إدارة الإشعارات الحديثة ==============
        function addToRecentNotifications(fileName, fileLink, channelName) {
            const recentList = document.getElementById('recentList');
            
            // إزالة حالة فارغة إذا وجدت
            const emptyState = recentList.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString('ar-SA', { 
                hour: '2-digit', 
                minute: '2-digit',
                second: '2-digit'
            });
            
            const dateStr = now.toLocaleDateString('ar-SA', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
            
            const notificationEl = document.createElement('div');
            notificationEl.className = 'notification-item';
            notificationEl.innerHTML = `
                <h4>
                    <i class="fas fa-file-alt" style="color: #0088cc; margin-left: 8px;"></i>
                    ${escapeHtml(fileName)}
                </h4>
                <p>
                    <i class="fas fa-link" style="margin-left: 5px;"></i>
                    <a href="${escapeHtml(fileLink)}" target="_blank">رابط الملف</a>
                </p>
                <span class="channel-badge">
                    <i class="fas fa-broadcast-tower" style="margin-left: 5px;"></i>
                    ${escapeHtml(channelName)}
                </span>
                <div class="time">
                    <i class="far fa-clock" style="margin-left: 5px;"></i>
                    ${dateStr} - ${timeStr}
                </div>
            `;
            
            // إضافة في بداية القائمة
            recentList.insertBefore(notificationEl, recentList.firstChild);
            
            // حفظ في التخزين المحلي
            saveToLocalStorage(fileName, fileLink, channelName);
        }

        // ============== التخزين المحلي ==============
        function saveToLocalStorage(fileName, fileLink, channelName) {
            const recentNotifications = JSON.parse(localStorage.getItem('telegramNotifications') || '[]');
            recentNotifications.unshift({
                fileName,
                fileLink,
                channelName,
                timestamp: new Date().toISOString()
            });
            
            // الاحتفاظ بآخر 20 إشعار فقط
            if (recentNotifications.length > 20) {
                recentNotifications.pop();
            }
            
            localStorage.setItem('telegramNotifications', JSON.stringify(recentNotifications));
        }

        function loadRecentNotifications() {
            const recentNotifications = JSON.parse(localStorage.getItem('telegramNotifications') || '[]');
            const recentList = document.getElementById('recentList');
            
            if (recentNotifications.length > 0) {
                const emptyState = recentList.querySelector('.empty-state');
                if (emptyState) {
                    emptyState.remove();
                }
                
                recentNotifications.slice(0, 10).forEach(notification => {
                    const date = new Date(notification.timestamp);
                    const timeStr = date.toLocaleTimeString('ar-SA', { 
                        hour: '2-digit', 
                        minute: '2-digit' 
                    });
                    const dateStr = date.toLocaleDateString('ar-SA', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric'
                    });
                    
                    const notificationEl = document.createElement('div');
                    notificationEl.className = 'notification-item';
                    notificationEl.innerHTML = `
                        <h4>
                            <i class="fas fa-file-alt" style="color: #0088cc; margin-left: 8px;"></i>
                            ${escapeHtml(notification.fileName)}
                        </h4>
                        <p>
                            <i class="fas fa-link" style="margin-left: 5px;"></i>
                            <a href="${escapeHtml(notification.fileLink)}" target="_blank">رابط الملف</a>
                        </p>
                        <span class="channel-badge">
                            <i class="fas fa-broadcast-tower" style="margin-left: 5px;"></i>
                            ${escapeHtml(notification.channelName)}
                        </span>
                        <div class="time">
                            <i class="far fa-clock" style="margin-left: 5px;"></i>
                            ${dateStr} - ${timeStr}
                        </div>
                    `;
                    
                    recentList.appendChild(notificationEl);
                });
            }
        }

        // ============== اختصارات لوحة المفاتيح ==============
        document.addEventListener('keydown', (e) => {
            // Ctrl + Enter للإرسال
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('notificationForm').requestSubmit();
            }
            // Ctrl + V للصق في حقل الرابط
            if (e.ctrlKey && e.key === 'v' && document.activeElement === document.getElementById('fileLink')) {
                setTimeout(() => {
                    document.getElementById('pasteBtn').click();
                }, 100);
            }
        });

        // ============== بدء التطبيق ==============
        window.addEventListener('load', () => {
            loadStats();
            loadRecentNotifications();
            
            // تحديث الإحصائيات كل 30 ثانية
            setInterval(loadStats, 30000);
            
            console.log('🚀 نظام إشعارات تيليجرام جاهز للعمل');
            console.log('💡 استخدم Ctrl+Enter للإرسال السريع');
            console.log('📋 استخدم زر اللصق للصق الرابط تلقائياً');
        });
    </script>
</body>
</html>
